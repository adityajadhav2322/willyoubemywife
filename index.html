<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Question for You</title>
    <style>
        body {
            background-color: #fdf6f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
            text-align: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 500px;
        }
        h1 { color: #d63384; }
        
        /* The Ring CSS Art */
        .ring-container {
            margin: 30px auto;
            position: relative;
            width: 100px;
            height: 100px;
        }
        .band {
            width: 80px;
            height: 80px;
            border: 8px solid #ffd700;
            border-radius: 50%;
            position: absolute;
            top: 10px;
            left: 10px;
        }
        .diamond {
            width: 30px;
            height: 30px;
            background: #e0f7fa;
            border: 2px solid #b2ebf2;
            transform: rotate(45deg);
            position: absolute;
            top: -5px;
            left: 35px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Dearest Fatemeh</h1>
        <p>You are my heart, my sanctuary, and my greatest blessing.</p>
        
        <div class="ring-container">
            <div class="band"></div>
            <div class="diamond"></div>
        </div>

        <p>I cannot imagine my future without you by my side. Will you do me the ultimate honor of being my wife?</p>
    </div>

</body>
</html>
